defaults:
  - _self_
  - experiment: base_experiment

# ── Data ──────────────────────────────────────────────────────────────────────
data:
  raw_path: data/raw
  processed_path: data/processed
  features_path: data/features
  min_ratings_per_user: 5
  min_ratings_per_movie: 10
  test_size: 0.2
  val_size: 0.1
  random_seed: 42

# ── Feature Engineering ───────────────────────────────────────────────────────
features:
  user_features:
    - user_id
    - user_age_bucket
    - user_gender
    - user_avg_rating
    - user_rating_count
    - user_genre_preferences
  item_features:
    - movie_id
    - title
    - genres
    - year
    - avg_rating
    - rating_count
    - popularity_score
  embedding_dim: 64
  max_sequence_length: 50

# ── Model ─────────────────────────────────────────────────────────────────────
model:
  type: two_tower          # two_tower | ncf | hybrid
  user_embedding_dim: 64
  item_embedding_dim: 64
  hidden_layers: [256, 128, 64]
  dropout_rate: 0.3
  l2_regularization: 0.001
  activation: relu

# ── Training ──────────────────────────────────────────────────────────────────
training:
  epochs: 50
  batch_size: 1024
  learning_rate: 0.001
  optimizer: adam
  loss: mean_squared_error
  metrics:
    - rmse
    - mae
    - ndcg_at_10
  early_stopping:
    monitor: val_loss
    patience: 5
    restore_best_weights: true
  callbacks:
    - early_stopping
    - reduce_lr_on_plateau
    - model_checkpoint

# ── MLflow ────────────────────────────────────────────────────────────────────
mlflow:
  tracking_uri: http://localhost:5000
  experiment_name: cinerecops
  model_name: cinerecops-recommender
  auto_log: true
  log_models: true
  registered_model_alias: champion

# ── Serving ───────────────────────────────────────────────────────────────────
serving:
  host: 0.0.0.0
  port: 8000
  workers: 4
  top_k: 10
  model_stage: Production
  cache_ttl_seconds: 300

# ── Monitoring ────────────────────────────────────────────────────────────────
monitoring:
  enable_prometheus: true
  prometheus_port: 8001
  log_predictions: true
  drift_detection: true
