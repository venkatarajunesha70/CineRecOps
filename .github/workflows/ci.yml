name: CI — Lint, Test, Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.10"

jobs:
  # ── Lint ─────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('requirements.txt') }}

      - name: Install lint tools
        run: pip install ruff==0.1.9 black==23.12.1

      - name: Run ruff
        run: ruff check src/ tests/

      - name: Check black formatting
        run: black --check src/ tests/

  # ── Unit Tests ────────────────────────────────────────────────────────────────
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install tensorflow==2.15.0
          pip install pytest==7.4.4 pytest-cov==4.1.0
          pip install numpy pandas scikit-learn loguru

      - name: Run unit tests
        run: pytest tests/unit/ -v --cov=src --cov-report=xml --cov-report=term

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ── Integration Tests ─────────────────────────────────────────────────────────
  test-integration:
    name: Integration Tests (API)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install tensorflow==2.15.0
          pip install fastapi==0.109.0 uvicorn==0.27.0 pydantic==2.5.3 httpx==0.26.0
          pip install pytest==7.4.4 pytest-asyncio==0.23.3 mlflow==2.9.2
          pip install numpy pandas pyarrow loguru prometheus-client

      - name: Run integration tests
        run: pytest tests/integration/ -v

  # ── Docker Build ──────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build training image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.train
          push: false
          tags: cinerecops-train:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build serving image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.serve
          push: false
          tags: cinerecops-serve:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
